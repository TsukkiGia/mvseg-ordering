version: 1

# Fixed-uncertainty start-nomination simulation — T1mix
#
# Run:
#   python -m experiments.tools.start_nomination_launcher --config experiments/recipes/fixed_uncertainty_sim/t1mix_fixed_uncertainty_sim.yaml --run

defaults:
  selectors:
    - closest_centroid
    - medoid
    - farthest_centroid
    - max_mean_distance
    - minimax_center

  encoders:
    - experiments/encoder_configs/clip_default.yaml
    - experiments/encoder_configs/vit_default.yaml
    - experiments/encoder_configs/dinov2_default.yaml
    - experiments/encoder_configs/medsam_default.yaml
    - experiments/encoder_configs/medsam_spatial_mean.yaml
    - experiments/encoder_configs/multiverseg_default.yaml
    - experiments/encoder_configs/multiverseg_spatial_mean.yaml

  procedure: random_vs_uncertainty_final
  ablation: pretrained_baseline5p
  dataset: T1mix
  random_policy: random
  data_split: train
  dataset_seed: 42
  device: cuda

simulations:
  - name: t1mix_curriculum
    policies:
      - curriculum
    out_dir: experiments/scripts/fixed_uncertainty_sim_final/t1mix/curriculum
  - name: t1mix_reverse_curriculum
    policies:
      - reverse_curriculum
    out_dir: experiments/scripts/fixed_uncertainty_sim_final/t1mix/reverse_curriculum