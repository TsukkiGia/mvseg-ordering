version: 1

# Fixed-uncertainty start-nomination simulation — SpineWeb
#
# Run:
#   python -m experiments.tools.start_nomination_launcher \
#       --config experiments/recipes/fixed_uncertainty_sim/spineweb_fixed_uncertainty_sim.yaml --run

defaults:
  selectors:
    - closest_centroid
    - medoid
    - farthest_centroid
    - max_mean_distance

  encoders:
    - experiments/encoder_configs/clip_default.yaml
    - experiments/encoder_configs/vit_default.yaml
    - experiments/encoder_configs/dinov2_default.yaml
    - experiments/encoder_configs/medsam_default.yaml
    - experiments/encoder_configs/multiverseg_default.yaml

  procedure: random_vs_uncertainty_final
  ablation: pretrained_baseline5p
  dataset: SpineWeb
  random_policy: random
  data_split: train
  dataset_seed: 42
  device: cuda

simulations:
  - name: spineweb_curriculum
    policies:
      - curriculum
    out_dir: experiments/scripts/fixed_uncertainty_sim_final/spineweb/curriculum
  - name: spineweb_reverse_curriculum
    policies:
      - reverse_curriculum
    out_dir: experiments/scripts/fixed_uncertainty_sim_final/spineweb/reverse_curriculum