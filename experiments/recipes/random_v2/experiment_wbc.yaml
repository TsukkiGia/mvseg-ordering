version: 1

# Run:
#   python -m experiments.tools.exp_yaml_launcher --config experiments/recipes/random_v2/experiment_wbc.yaml --run

# Defaults applied to all experiments unless overridden per-entry.
defaults:
  prompt_config_path: experiments/prompt_generator_configs/click_prompt_generator.yml
  prompt_config_key: click_generator
  prompt_iterations: 20
  permutations: 100
  use_mega_dataset: true
  mega_dataset_name: WBC
  no_visualize: true
  device: cuda
  shards: 4
  experiment_seed: 23
  eval_fraction: 0.33
  eval_checkpoints: [1, 2, 4, 8, 10]
  plan_b_subset_size: 10

experiments:

  - name: pretrained_baseline_random_v2
    pretrained_model_score_goal: true
    commit_ground_truth: false
    script_dir: experiments/scripts/random_v2/experiment_wbc/pretrained_baseline
    plan_b_num_subsets: 10
    plan: [B]

  - name: pretrained_baseline_random_v2_5
    pretrained_model_score_goal: true
    commit_ground_truth: false
    prompt_iterations: 5
    script_dir: experiments/scripts/random_v2/experiment_wbc/pretrained_baseline5
    plan_b_num_subsets: 10
    plan: [B]

  - name: pretrained_baseline_random_v2_gt
    pretrained_model_score_goal: true
    commit_ground_truth: true
    script_dir: experiments/scripts/random_v2/experiment_wbc/pretrained_baseline_gt
    plan_b_num_subsets: 10
    plan: [B]

  - name: pretrained_baseline_random_v2_5_gt
    pretrained_model_score_goal: true
    commit_ground_truth: true
    prompt_iterations: 5
    script_dir: experiments/scripts/random_v2/experiment_wbc/pretrained_baseline5_gt
    plan_b_num_subsets: 10
    plan: [B]
